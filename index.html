<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#08090a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Cadence — Running Metronome</title>
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Martian+Mono:wght@400;600;800&display=swap" rel="stylesheet" />
</head>
<body>
<div class="bg"></div>

<div class="app">
  <header>
    <div class="brand">
      <span class="dot"></span>
      <span class="name">Cadence<span>·SPM</span></span>
    </div>
    <button class="icon-btn" id="settingsBtn" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <main>
    <div class="dial" id="dial">
      <svg viewBox="0 0 300 300" id="gauge">
        <path class="track" id="trackPath"/>
        <g class="ticks" id="ticks"></g>
        <path class="prog" id="progPath"/>
        <g id="knob">
          <circle class="knob" id="knobC" r="11"/>
          <circle class="knob-core" id="knobCore" r="4"/>
        </g>
      </svg>
      <div class="readout">
        <div class="bpm" id="bpm">180</div>
        <div class="unit">Steps / Min</div>
        <div class="cat" id="cat"></div>
      </div>
    </div>

    <div class="adjust">
      <button class="step" id="minus" aria-label="Decrease">−</button>
      <button class="tap" id="tap">Tap</button>
      <button class="step" id="plus" aria-label="Increase">+</button>
    </div>

    <div class="presets" id="presets"></div>
  </main>

  <footer>
    <div class="stats">
      <div class="stat"><div class="v" id="elapsed">00:00</div><span class="lbl">Time</span></div>
      <div class="stat"><div class="v" id="steps">0</div><span class="lbl">Steps</span></div>
      <div class="stat"><div class="v" id="distEst">—</div><span class="lbl">Est. Dist</span></div>
    </div>
    <button class="play" id="play">
      <svg class="ic-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <svg class="ic-stop" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      <span id="playLabel">Start</span>
    </button>
  </footer>
</div>

<!-- settings -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <h2>Settings</h2>

  <div class="row">
    <div><div class="label">Sound</div><div class="sub">Click character</div></div>
    <div class="seg" id="soundSeg">
      <button data-v="click" class="on">Click</button>
      <button data-v="beep">Beep</button>
      <button data-v="wood">Wood</button>
      <button data-v="off">Off</button>
    </div>
  </div>

  <div class="row">
    <div><div class="label">Accent</div><div class="sub">Stronger beat every…</div></div>
    <div class="seg" id="accentSeg">
      <button data-v="0" class="on">Off</button>
      <button data-v="2">2</button>
      <button data-v="3">3</button>
      <button data-v="4">4</button>
    </div>
  </div>

  <div class="row">
    <div><div class="label">Volume</div><div class="sub" id="volSub">70%</div></div>
    <input type="range" min="0" max="100" value="70" class="slider" id="vol" />
  </div>

  <div class="row">
    <div><div class="label">Vibrate</div><div class="sub">Haptic per step (Android)</div></div>
    <div class="toggle" id="vibToggle"></div>
  </div>

  <div class="row">
    <div><div class="label">Keep screen awake</div><div class="sub">While running</div></div>
    <div class="toggle on" id="wakeToggle"></div>
  </div>

  <div class="row">
    <div><div class="label">Stride length</div><div class="sub" id="strideSub">0.95 m — for distance estimate</div></div>
    <input type="range" min="60" max="160" value="95" class="slider" id="stride" />
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
